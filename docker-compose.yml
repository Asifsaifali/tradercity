services:
  postgres:
    image: postgres:17
    container_name: tradercity-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tradercity
      POSTGRES_PASSWORD: tradercity
      POSTGRES_DB: tradercity
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:8
    container_name: tradercity-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data: